version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vc_elemental_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: vcelemental
      POSTGRES_PASSWORD: vcelemental_local
      POSTGRES_DB: vcelemental_mp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vc_elemental_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    name: vc_elemental_postgres_data
  redis_data:
    name: vc_elemental_redis_data
